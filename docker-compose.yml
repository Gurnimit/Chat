version: '3.8'

services:
  backend:
    build: ./server
    container_name: chat-app-backend
    restart: always
    ports:
      - "5000:5000"
    environment:
      - DATABASE_URL=file:/usr/src/app/prisma/dev.db
      - PORT=5000
      - ACCESS_TOKEN_SECRET=super_secret_access_key_123
      - REFRESH_TOKEN_SECRET=super_secret_refresh_key_456
      - NODE_ENV=production
    command: sh -c "npx prisma db push --accept-data-loss && npm run db:seed && node dist/index.js"
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:5000/api/observability/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    volumes:
      # Persist media uploads locally on the host
      - ./server/uploads:/usr/src/app/uploads
      # Persist SQLite dev.db locally on the host
      - ./server/prisma:/usr/src/app/prisma

  frontend:
    build: ./client
    container_name: chat-app-frontend
    restart: always
    ports:
      - "80:80"
    depends_on:
      backend:
        condition: service_healthy

