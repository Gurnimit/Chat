version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: velvet-postgres-prod
    restart: always
    environment:
      POSTGRES_DB: velvet_chat
      POSTGRES_USER: ${POSTGRES_USER:-velvet_admin}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-secure_prod_password_123}
    ports:
      - "5432:5432"
    volumes:
      - postgres_prod_data:/var/lib/postgresql/data

  backend:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: velvet-backend-prod
    restart: always
    ports:
      - "5000:5000"
    environment:
      NODE_ENV: production
      PORT: 5000
      DATABASE_URL: postgresql://${POSTGRES_USER:-velvet_admin}:${POSTGRES_PASSWORD:-secure_prod_password_123}@postgres:5432/velvet_chat?schema=public
      ACCESS_TOKEN_SECRET: ${ACCESS_TOKEN_SECRET:-super_secret_access_key_123}
      REFRESH_TOKEN_SECRET: ${REFRESH_TOKEN_SECRET:-super_secret_refresh_key_456}
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:-http://localhost:5173,http://localhost:5000,http://172.16.243.96:5000}
    depends_on:
      - postgres

volumes:
  postgres_prod_data:
